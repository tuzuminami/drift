name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: drift
          POSTGRES_USER: drift
          POSTGRES_PASSWORD: drift_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drift -d drift"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
        env:
          DRIFT_POSTGRES_TEST_URL: postgresql://drift:drift_dev_password@localhost:5432/drift
